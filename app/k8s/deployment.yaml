apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-dashboard
  namespace: fleet-demo
  labels:
    app: fleet-dashboard
spec:
  replicas: 2  # matches 2-node clusters; anti-affinity is preferredDuringScheduling
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0       # never exceed replica count (safe for tightly-packed nodes)
      maxUnavailable: 1  # roll one pod at a time
  selector:
    matchLabels:
      app: fleet-dashboard
  template:
    metadata:
      labels:
        app: fleet-dashboard
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: fleet-dashboard
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 10
      containers:
        - name: dashboard
          image: ${ACR_SERVER}/fleet-dashboard:v3
          ports:
            - containerPort: 8080
          env:
            - name: CLUSTER_NAME
              value: "${CLUSTER_NAME}"
            - name: ENVIRONMENT
              value: "${ENVIRONMENT}"
            - name: REGION
              value: "australiaeast"
            - name: APP_VERSION
              value: "1.0.0"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fleet-dashboard-pdb
  namespace: fleet-demo
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: fleet-dashboard
